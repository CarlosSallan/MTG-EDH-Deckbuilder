{% extends "base.html" %}

{% block title %}Decks - MTG EDH BUILDER{% endblock %}

{% block content %}
<h1>Public decks</h1>

<ul>
{% for deck in decks %}
    <li>
        <a href="/decks/{{ deck.id }}/">
            {{ deck.name }} - Commander: {{ deck.commander }}
        </a>
    </li>
{% endfor %}
</ul>

{% endblock %}
