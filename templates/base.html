<!-- templates/base.html -->

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MTG EDH Builder{% endblock %}</title>  <!-- child templates override this -->
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">  <!-- generates /static/blog/style.css -->
</head>
<body>
    <ul>
        <li><a href="{% url 'blog:home' %}">Home</a></li>
    </ul>

    <div class="container">
        {% block content %}{% endblock %}  <!-- each page fills this block with its own content -->
    </div>

    <footer>
        <p>MTG EDH Builder - 2026</p>
    </footer>
</body>
</html>
